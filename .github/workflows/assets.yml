name: Asset Regeneration

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Asset type to regenerate (tts/image/all)'
        required: true
        default: 'all'
        type: choice
        options:
          - tts
          - image
          - all

jobs:
  tts:
    if: inputs.mode == 'tts' || inputs.mode == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r pipelines/tts/requirements.txt
      - name: Generate TTS audio
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python pipelines/tts/generate_tts.py data/verified/creatures_verified.json assets/audio/
      - uses: actions/cache/save@v4
        with:
          path: assets/audio/
          key: tts-audio-${{ github.run_id }}

  image:
    if: inputs.mode == 'image' || inputs.mode == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r pipelines/image/requirements.txt
      - name: Generate creature art
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          python pipelines/image/generate_creature_art.py data/verified/creatures_verified.json assets/images/
      - uses: actions/cache/save@v4
        with:
          path: assets/images/
          key: image-art-${{ github.run_id }}

name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install
        working-directory: apps/web
      - run: pnpm exec tsc -b
        working-directory: apps/web
      - run: pnpm test
        working-directory: apps/web
      - run: pnpm build
        working-directory: apps/web
